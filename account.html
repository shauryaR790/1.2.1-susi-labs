<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Account | SUSI LABS</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#5B0030">
    <link rel="icon" href="SUSI.jpg.jpeg" type="image/jpeg">
    <link href="https://fonts.cdnfonts.com/css/hagrid-trial" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=271">
</head>

<body class="products-page cart-page account-page account-dashboard-page">
    <div class="print-marquee print-marquee--hero products-ticker" aria-hidden="true">
        <div class="print-marquee-track">
            <div class="print-marquee-content">
                <span class="print-marquee-item">MY ACCOUNT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">ORDERS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">CART</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">TRACK STATUS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">DELHIVERY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
            </div>
            <div class="print-marquee-content" aria-hidden="true">
                <span class="print-marquee-item">MY ACCOUNT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">ORDERS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">CART</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">TRACK STATUS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">DELHIVERY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
            </div>
        </div>
    </div>

    <main class="products-shell cart-shell">
        <div class="products-layout cart-layout">
            <aside class="products-sidebar" aria-label="Account navigation">
                <div class="products-sidebar__stick">
                    <a class="products-home" href="index.html" aria-label="Back to home">
                        <span class="products-home__word products-home__word--a">SUSI</span>
                        <span class="products-home__word products-home__word--b">LABS</span>
                    </a>
                    <nav class="cart-sidebar-links" aria-label="Quick links">
                        <a class="cart-sidebar-links__btn" href="products.html">shop</a>
                        <a class="cart-sidebar-links__btn is-active cart-sidebar-links__btn--desk-only" href="account.html">account</a>
                        <a class="cart-sidebar-links__btn cart-sidebar-links__btn--desk-only" href="index.html">home</a>
                        <button type="button" class="cart-sidebar-links__btn cart-sidebar-links__btn--ghost" id="account-sign-out">sign out</button>
                    </nav>
                </div>
            </aside>

            <div class="cart-main account-main">
                <header class="products-header cart-header account-header">
                    <div class="cart-title products-title">
                        <h1>MY ACCOUNT</h1>
                    </div>
                </header>

                <div class="cart-main__scroll account-dashboard-wrap">
                    <div class="account-dash-stats" id="account-dash-stats" hidden aria-label="Account overview"></div>

                    <div class="account-dashboard">
                    <section class="account-dash-card account-dash-card--cart" aria-labelledby="account-cart-title">
                        <div class="account-dash-card__head">
                            <h2 id="account-cart-title">Your cart</h2>
                            <a class="account-dash-card__link" href="cart.html">view cart</a>
                        </div>
                        <div id="account-cart-body" class="account-dash-card__body">
                            <p class="orders-loading">Loading cart…</p>
                        </div>
                    </section>

                    <section class="account-dash-card account-dash-card--orders" aria-labelledby="account-orders-title">
                        <div class="account-dash-card__head">
                            <h2 id="account-orders-title">Your orders</h2>
                            <a class="account-dash-card__link" href="orders.html">all orders</a>
                        </div>
                        <div id="account-orders-body" class="account-dash-card__body">
                            <p class="orders-loading">Loading orders…</p>
                        </div>
                    </section>
                    </div>

                    <section class="account-dash-help" aria-label="Quick links">
                        <a class="account-dash-help__link" href="products.html">Browse products</a>
                        <a class="account-dash-help__link" href="custom-build.html">Custom build</a>
                        <a class="account-dash-help__link" href="orders.html">All orders</a>
                        <a class="account-dash-help__link" href="mailto:susilabs.global@gmail.com">Get help</a>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script src="marquee-fill.js?v=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="order-status.js?v=1"></script>
    <script src="site-auth.js?v=2"></script>
    <script src="cart-store.js?v=2"></script>
    <script src="account-page.js?v=2"></script>
    <script defer src="cookie-consent.js?v=1"></script>
</body>

</html>
