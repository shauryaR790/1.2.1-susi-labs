<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order confirmed | SUSI LABS</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#5B0030">
    <link rel="icon" href="SUSI.jpg.jpeg" type="image/jpeg">
    <link href="https://fonts.cdnfonts.com/css/hagrid-trial" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=292">
</head>

<body class="checkout-success-page">
    <main class="checkout-success-shell">
        <section class="checkout-success" aria-live="polite">
            <p class="checkout-success__tag" id="success-tag">payment received</p>
            <h1 class="checkout-success__title" id="success-title">You're in the queue.</h1>
            <p class="checkout-success__meta" id="success-meta">Thanks for your order. We'll start your build and reach out if we need anything else.</p>
            <p class="checkout-success__ref"><span class="checkout-success__ref-label">Order ref:</span> <span id="order-ref" class="checkout-code">—</span></p>
            <div class="checkout-success__actions">
                <a class="cart-empty__btn" id="success-view-order" href="orders.html" hidden>view order</a>
                <a class="cart-empty__btn" href="products.html">keep shopping</a>
                <a class="cart-summary__shop" href="index.html">home</a>
            </div>
        </section>
    </main>

    <script src="site-cursor.js?v=2"></script>
    <script src="checkout-success-page.js?v=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="site-auth.js?v=2"></script>
    <script defer src="mobile-nav.js?v=2"></script>
    <script defer src="cookie-consent.js?v=1"></script>
</body>

</html>
