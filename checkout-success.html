<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order confirmed | SUSI LABS</title>
    <link rel="icon" href="SUSI.jpg.jpeg" type="image/jpeg">
    <link href="https://fonts.cdnfonts.com/css/hagrid-trial" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=138">
</head>

<body class="products-page cart-page checkout-page checkout-success-page">
    <div class="print-marquee print-marquee--hero products-ticker" aria-hidden="true">
        <div class="print-marquee-track">
            <div class="print-marquee-content">
                <span class="print-marquee-item">PRINT IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
            </div>
            <div class="print-marquee-content" aria-hidden="true">
                <span class="print-marquee-item">PRINT IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
            </div>
        </div>
    </div>

    <main class="products-shell cart-shell checkout-success-shell">
        <section class="checkout-success" aria-live="polite">
            <p class="checkout-success__tag">payment received</p>
            <h1 class="checkout-success__title">You're in the queue.</h1>
            <p class="checkout-success__meta">Thanks for your order. We'll start your build and reach out if we need anything else.</p>
            <p class="checkout-success__ref">Order ref: <span id="order-ref">—</span></p>
            <div class="checkout-success__actions">
                <a class="cart-empty__btn" href="products.html">keep shopping</a>
                <a class="cart-summary__shop" href="index.html">back to home</a>
            </div>
        </section>
    </main>

    <script>
        try {
            const params = new URLSearchParams(window.location.search)
            const id = params.get("order") || ""
            const el = document.getElementById("order-ref")
            if (el && id) el.textContent = id.slice(0, 8).toUpperCase()
        } catch {}
    </script>
</body>

</html>
