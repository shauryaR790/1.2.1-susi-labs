<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders | SUSI LABS</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#5B0030">
    <link rel="icon" href="SUSI.jpg.jpeg" type="image/jpeg">
    <link href="https://fonts.cdnfonts.com/css/hagrid-trial" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=282">
</head>

<body class="products-page cart-page account-page orders-page">
    <div class="print-marquee print-marquee--hero products-ticker" aria-hidden="true">
        <div class="print-marquee-track">
            <div class="print-marquee-content">
                <span class="print-marquee-item">YOUR ORDERS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">TRACK STATUS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">DELHIVERY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">ORDER CONFIRMED</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">AWB READY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">PRINT IT</span><span class="print-marquee-dot"></span>
            </div>
            <div class="print-marquee-content" aria-hidden="true">
                <span class="print-marquee-item">YOUR ORDERS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">TRACK STATUS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">DELHIVERY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">ORDER CONFIRMED</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">AWB READY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">PRINT IT</span><span class="print-marquee-dot"></span>
            </div>
        </div>
    </div>

    <main class="products-shell cart-shell">
        <div class="products-layout cart-layout">
            <aside class="products-sidebar" aria-label="Account navigation">
                <div class="products-sidebar__stick">
                    <a class="products-home" href="index.html" aria-label="Back to home">
                        <span class="products-home__word products-home__word--a">SUSI</span>
                        <span class="products-home__word products-home__word--b">LABS</span>
                    </a>
                    <nav class="cart-sidebar-links" aria-label="Quick links">
                        <a class="cart-sidebar-links__btn cart-sidebar-links__btn--desk-only" href="products.html">shop</a>
                        <a class="cart-sidebar-links__btn cart-sidebar-links__btn--mob-nav is-active" href="orders.html">my orders</a>
                        <a class="cart-sidebar-links__btn cart-sidebar-links__btn--mob-nav" href="account.html">my account</a>
                        <a class="cart-sidebar-links__btn cart-sidebar-links__btn--desk-only" href="login.html" data-auth-show="signed-out">sign in</a>
                        <button type="button" class="cart-sidebar-links__btn cart-sidebar-links__btn--ghost cart-sidebar-links__btn--desk-only" id="account-sign-out" data-auth-show="signed-in" hidden>sign out</button>
                    </nav>
                </div>
            </aside>

            <div class="cart-main account-main">
                <header class="products-header cart-header orders-header">
                    <div class="cart-title products-title">
                        <h1>MY ORDERS</h1>
                    </div>
                </header>

                <div class="cart-main__scroll">
                    <p class="orders-loading" id="orders-loading">Loading your orders…</p>
                    <p class="orders-empty" id="orders-empty" hidden>You haven't placed any orders yet.</p>
                    <div class="orders-list" id="orders-list" hidden></div>
                </div>
            </div>
        </div>
    </main>

    <script src="marquee-fill.js?v=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-catalog.js?v=1"></script>
    <script src="order-status.js?v=1"></script>
    <script src="site-auth.js?v=2"></script>
    <script src="orders-page.js?v=3"></script>
    <script defer src="cookie-consent.js?v=1"></script>
</body>

</html>
