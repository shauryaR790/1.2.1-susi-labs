<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products | SUSI LABS</title>
    <link rel="icon" href="SUSI.jpg.jpeg" type="image/jpeg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.cdnfonts.com/css/peace-sans" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/hagrid-trial" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/extenda-trial" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css?v=153">

    <script>
        // Prevent flash: only hide when arriving from ORDER NOW transition.
        try {
            if (sessionStorage.getItem("susi:productsIntro") === "1") {
                document.documentElement.classList.add("products-intro");
            }
        } catch {}
    </script>
</head>

<body class="products-page">
    <!-- Top ticker (same as hero theme) -->
    <div class="print-marquee print-marquee--hero products-ticker" aria-hidden="true">
        <div class="print-marquee-track">
            <div class="print-marquee-content">
                <span class="print-marquee-item">PRINT IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SLICE IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">BUILD IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">CUSTOM PARTS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">RESIN READY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">FDM FARM</span><span class="print-marquee-dot"></span>
            </div>
            <div class="print-marquee-content" aria-hidden="true">
                <span class="print-marquee-item">PRINT IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SLICE IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">BUILD IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">CUSTOM PARTS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">RESIN READY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">FDM FARM</span><span class="print-marquee-dot"></span>
            </div>
        </div>
    </div>

    <main class="products-shell">
        <div class="products-layout">
            <aside class="products-sidebar" aria-label="Products navigation">
                <div class="products-sidebar__stick">
                    <a class="products-home" href="index.html" aria-label="Back to home">
                        <span class="products-home__word products-home__word--a">SUSI</span>
                        <span class="products-home__word products-home__word--b">LABS</span>
                    </a>

                    <section class="products-controls" aria-label="Product filters">
                        <button type="button" class="products-filter is-active">all</button>
                        <button type="button" class="products-filter">figures</button>
                        <button type="button" class="products-filter">functional</button>
                        <button type="button" class="products-filter">props</button>
                        <button type="button" class="products-filter">resin</button>
                    </section>
                </div>
            </aside>

            <div class="products-main">
                <header class="products-header">
                    <div class="products-title">
                        <h1>ORDER NOW</h1>
                        <p>Filter by category, pick your build, and add to cart when you're ready.</p>
                    </div>
                    <a class="cart-nav cart-nav--products" href="cart.html" aria-label="Shopping cart">
                        <svg class="cart-nav__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M3 3h2l2.2 12.4a2 2 0 0 0 2 1.6h9.2a2 2 0 0 0 2-1.6L22 8H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="10" cy="21" r="1.35" fill="currentColor"/>
                            <circle cx="18" cy="21" r="1.35" fill="currentColor"/>
                        </svg>
                        <span class="cart-nav__badge" data-cart-badge hidden aria-hidden="true">0</span>
                    </a>
                </header>

                <section class="products-grid-page" aria-label="Products" aria-busy="true">
                    <p class="products-status products-status--loading">loading products…</p>
                </section>
            </div>
        </div>

        <footer class="products-footer">
            <a class="products-back" href="index.html">← back to home</a>
        </footer>
    </main>

    <div class="order-transition" id="order-transition" aria-hidden="true">
        <div class="order-transition__fx" aria-hidden="true">
            <div class="order-transition__pulse"></div>
            <div class="order-transition__ring"></div>
            <span class="order-transition__corner order-transition__corner--tl"></span>
            <span class="order-transition__corner order-transition__corner--tr"></span>
            <span class="order-transition__corner order-transition__corner--bl"></span>
            <span class="order-transition__corner order-transition__corner--br"></span>
            <div class="order-transition__orbit"><span class="order-transition__nozzle"></span></div>
            <div class="order-transition__sparks">
                <i></i><i></i><i></i><i></i><i></i><i></i>
            </div>
            <p class="order-transition__tag">queue unlocked</p>
        </div>
        <div class="order-transition__track" aria-hidden="true">
            <span class="order-transition__shine"></span>
            <span class="order-transition__word order-transition__word--a">SUSI</span>
            <span class="order-transition__word order-transition__word--b">LABS</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="cart-store.js?v=2"></script>
    <script src="page-transition.js"></script>
    <script src="products.js?v=5"></script>
</body>

</html>
