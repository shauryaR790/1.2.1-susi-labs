<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order details | SUSI LABS</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#5B0030">
    <link rel="icon" href="SUSI.jpg.jpeg" type="image/jpeg">
    <link href="https://fonts.cdnfonts.com/css/hagrid-trial" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=286">

<body class="products-page cart-page account-page order-detail-page">
    <div class="print-marquee print-marquee--hero products-ticker" aria-hidden="true">
        <div class="print-marquee-track">
            <div class="print-marquee-content">
                <span class="print-marquee-item">ORDER DETAILS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">TRACK STATUS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">DELHIVERY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">YOUR ITEMS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
            </div>
            <div class="print-marquee-content" aria-hidden="true">
                <span class="print-marquee-item">ORDER DETAILS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">TRACK STATUS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">DELHIVERY</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">YOUR ITEMS</span><span class="print-marquee-dot"></span>
                <span class="print-marquee-item">SHIP IT</span><span class="print-marquee-dot"></span>
            </div>
        </div>
    </div>

    <main class="products-shell cart-shell account-shell order-detail-shell">
        <div class="account-detail order-detail-wrap">
            <a class="auth-card__home" href="orders.html">← My orders</a>

            <p class="orders-loading" id="order-loading">Loading order…</p>
            <p class="orders-empty" id="order-error" hidden role="alert"></p>

            <article class="order-detail" id="order-detail" hidden></article>
        </div>
    </main>

    <script src="marquee-fill.js?v=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-catalog.js?v=1"></script>
    <script src="order-status.js?v=1"></script>
    <script src="site-auth.js?v=2"></script>
    <script src="order-page.js?v=2"></script>
    <script defer src="cookie-consent.js?v=1"></script>
</body>

</html>
